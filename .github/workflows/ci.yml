name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Test, Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
