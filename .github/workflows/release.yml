name: Release

on:
  pull_request:
    branches:
      - main
    # Skip building an installable when the PR only touches docs. The run is
    # skipped only if EVERY changed file matches one of these patterns.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CONTEXT.md'
      - 'LICENSE'

# Supersede only an OLDER build of the SAME PR — a new push to PR #X cancels
# PR #X's in-flight run (we keep just the latest build per PR anyway). Different
# PRs have different groups, so they build in parallel and never cancel each
# other. The shared publish step is serialized separately, on the deploy job.
concurrency:
  group: release-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    # GitHub-hosted macOS runner. OnTheRoad is a public repo, so macOS minutes
    # are free (no 10x multiplier that applies to private repos). The runner is
    # ephemeral with an empty keychain, so unlike the old self-hosted Mac we
    # import the signing certificate into a throwaway keychain at build time.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Always regenerate ios/ from scratch. The committed ios/ already contains
      # the @bacons/apple-targets "share" extension target, and that plugin's
      # incremental update path crashes ("Cannot read properties of undefined
      # (reading 'removeFromProject')") when the target already exists. Only a
      # clean prebuild is compatible with it, so we never prebuild incrementally.
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      # The main app and the Share Extension are separate targets with separate
      # explicit App IDs (both with App Groups), so each needs its own Ad Hoc
      # provisioning profile. xcodebuild command-line build settings are global,
      # so pin the per-target profile in the project here instead.
      - name: Pin per-target code signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: node ci/set-release-signing.js

      # Ruby and CocoaPods ship preinstalled on the hosted macOS image, so we no
      # longer install them via Homebrew (that was only needed on the bare Mac).
      - name: Pod install
        run: pod install
        working-directory: ios

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_PROVISIONING_PROFILE_SHARE: ${{ secrets.APPLE_PROVISIONING_PROFILE_SHARE }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode -o "$PP_DIR/ontheroad_adhoc.mobileprovision"
          echo "$APPLE_PROVISIONING_PROFILE_SHARE" | base64 --decode -o "$PP_DIR/ontheroad_share_adhoc.mobileprovision"

      # The self-hosted Mac had the Apple Distribution cert + private key sitting
      # in its login keychain; we only unlocked it. A hosted runner starts empty,
      # so create a throwaway keychain and import the cert from secrets. The .p12
      # is an Apple Distribution certificate exported WITH its private key.
      # KEYCHAIN_PASSWORD is reused here purely as this temp keychain's password.
      - name: Create keychain and import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Make the temp keychain visible to xcodebuild's identity lookup.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g)
          rm -f "$CERT_PATH"

      - name: Archive
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          xcodebuild archive \
            -workspace ios/ontheroad.xcworkspace \
            -scheme ontheroad \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/ontheroad.xcarchive \
            -derivedDataPath "$HOME/Library/Developer/Xcode/DerivedData/ontheroad-runner" \
            CODE_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual

      - name: Export .ipa
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed "s/\$(APPLE_TEAM_ID)/$APPLE_TEAM_ID/" ci/ExportOptions.plist > /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath /tmp/ontheroad.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/ipa

      # Hand the signed .ipa to the deploy job, which publishes it. The build
      # itself touches nothing shared, so it stays per-PR parallel.
      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: /tmp/ipa/ontheroad.ipa
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Publish & Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # force-push the build-history branch
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Serialize the shared publish across ALL PRs — the read-modify-write of the
    # build-history branch and the Pages deploy must not race. Queue, never
    # cancel (cancel-in-progress: false), so a different PR's publish waits its
    # turn instead of being killed.
    concurrency:
      group: build-history-publish
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .ipa artifact
        uses: actions/download-artifact@v4
        with:
          name: ipa
          path: /tmp/ipa

      # Seed the working site from the existing build-history branch (the
      # published builds we're keeping). `git archive` extracts the tree without
      # any git metadata; on the very first run the branch is absent and we
      # start empty.
      - name: Seed site from build-history
        run: |
          SITE=/tmp/site
          rm -rf "$SITE"; mkdir -p "$SITE"
          if git fetch origin build-history; then
            git archive origin/build-history | tar -x -C "$SITE"
            echo "Seeded from existing build-history branch."
          else
            echo "No build-history branch yet — starting fresh."
          fi

      - name: Assemble build history
        env:
          SITE_DIR: /tmp/site
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          IPA_PATH: /tmp/ipa/ontheroad.ipa
          PAGES_BASE_URL: https://julesseg.github.io/OnTheRoad
          RETENTION: '5'
        run: node ci/assemble-build-history.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site

      # Persist the assembled site back to the build-history branch as a single
      # rolling commit (force-push), so old multi-MB .ipa blobs never accumulate
      # in git history. The branch is a derived store, not a record.
      - name: Push build-history branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/site
          git init -q
          git checkout -q -b build-history
          git add -A
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -q -m "Publish PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" build-history

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: Notify
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send ntfy notification
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SHORT_SHA: ${{ github.event.pull_request.head.sha }}
          INSTALL_URL: https://julesseg.github.io/OnTheRoad/builds/pr-${{ github.event.pull_request.number }}/
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC secret not set — skipping notification."
            exit 0
          fi
          SHA7="${SHORT_SHA:0:7}"
          if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.deploy.result }}" = "success" ]; then
            curl -fsS \
              -H "Title: On the Road build ready" \
              -H "Tags: white_check_mark" \
              -H "Click: ${INSTALL_URL}" \
              -d "${PR_TITLE} — ${SHA7}" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          else
            curl -fsS \
              -H "Title: On the Road build failed" \
              -H "Tags: x" \
              -H "Priority: high" \
              -H "Click: ${RUN_URL}" \
              -d "${PR_TITLE} — ${SHA7} · tap for logs" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          fi
