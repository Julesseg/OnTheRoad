# UPDATED App Store release pipeline — copy this over
# `.github/workflows/release-appstore.yml` (the automated push can't write
# workflow files; do it in the GitHub web UI, same as the first time). Changes
# vs. the installed version: triggers on vX.X.X tags instead of release/**
# branches, and sends an ntfy notification on success/failure.
#
# Builds and uploads to TestFlight / App Store Connect when you push a version
# tag named `vX.X.X`.
#
# ── ONE-TIME SETUP ───────────────────────────────────────────────────────────
# 1. App Store Connect → Users and Access → Integrations → App Store Connect API
#    → create a Team key with the "App Manager" role. Download the .p8 ONCE.
# 2. Add these repo secrets (Settings → Secrets and variables → Actions):
#      APP_STORE_CONNECT_KEY_ID      the key's Key ID (e.g. ABC123XYZ9)
#      APP_STORE_CONNECT_ISSUER_ID   the Issuer ID shown above the keys list
#      APP_STORE_CONNECT_KEY_P8      the full contents of the .p8 file
#    (APPLE_TEAM_ID and KEYCHAIN_PASSWORD already exist for the ad-hoc pipeline.)
# 3. Code signing on the hosted runner: it starts with an empty keychain, so the
#    Apple Distribution certificate has to be imported at build time. In Keychain
#    Access, export your "Apple Distribution" cert WITH its private key as a .p12,
#    then add these secrets (shared with release.yml):
#      APPLE_CERTIFICATE_P12         `base64 -i dist.p12 | pbcopy` of that .p12
#      APPLE_CERTIFICATE_PASSWORD    the password you set when exporting it
# 4. The app record must already exist in App Store Connect for bundle id
#    com.julesseguin.ontheroad (see store/README.md checklist).
#
# Then: `git tag v1.0.0 && git push origin v1.0.0` builds 1.0.0, signs it for the
# App Store via the API key (automatic signing, no manual profiles), and uploads
# it to TestFlight. Build number = CI run number, so every upload is unique and
# increasing.
#
# Optionally set NTFY_TOPIC (already used by release.yml) to get a push
# notification when the upload finishes or fails.
name: Release (App Store)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version to release (X.X.X)'
        required: true

# One release build per ref; a newer push supersedes an older in-flight one.
concurrency:
  group: release-appstore-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & upload to App Store Connect
    # GitHub-hosted macOS runner (free for this public repo). Ephemeral, so the
    # Apple Distribution cert is imported into a throwaway keychain at build time;
    # automatic signing then resolves the App Store profiles via the ASC API key.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Marketing version from the tag name (v1.2.3 -> 1.2.3), or the
      # manual-dispatch input. Build number from the run number so each upload is
      # unique and increasing, as App Store Connect requires.
      - name: Resolve version and build number
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' is not X.X.X — tag the commit v1.2.3 (or pass the version on manual dispatch)."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "Releasing $VERSION (build ${{ github.run_number }})"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Stamp version (CFBundleShortVersionString) and build number
      # (CFBundleVersion) into app.json BEFORE prebuild so the generated native
      # project carries them.
      - name: Stamp version into app config
        run: |
          node -e '
            const fs = require("fs");
            const p = "app.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j.expo.version = process.env.VERSION;
            j.expo.ios = j.expo.ios || {};
            j.expo.ios.buildNumber = process.env.BUILD_NUMBER;
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
            console.log("app.json -> version " + j.expo.version + ", build " + j.expo.ios.buildNumber);
          '

      # Clean prebuild — the @bacons/apple-targets share extension only
      # regenerates cleanly (same constraint as the ad-hoc release workflow).
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      # Ruby and CocoaPods ship preinstalled on the hosted macOS image.
      - name: Pod install
        run: pod install
        working-directory: ios

      # Write the API key where both xcodebuild and altool look for it:
      # ~/.appstoreconnect/private_keys/AuthKey_<KEYID>.p8
      - name: Install App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          printf '%s' "$ASC_KEY_P8" > "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      # Create a throwaway keychain and import the Apple Distribution cert + key
      # from secrets. Automatic signing uses that cert while the API key resolves
      # the App Store provisioning profiles. KEYCHAIN_PASSWORD is reused here
      # purely as this temp keychain's password.
      - name: Create keychain and import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g)
          rm -f "$CERT_PATH"

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace ios/ontheroad.xcworkspace \
            -scheme ontheroad \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/ontheroad.xcarchive \
            -derivedDataPath "$HOME/Library/Developer/Xcode/DerivedData/ontheroad-runner" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export .ipa
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed "s/\$(APPLE_TEAM_ID)/$APPLE_TEAM_ID/" ci/ExportOptions-appstore.plist > /tmp/ExportOptions-appstore.plist
          xcodebuild -exportArchive \
            -archivePath /tmp/ontheroad.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions-appstore.plist \
            -exportPath /tmp/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$ASC_KEY_PATH"

      - name: Upload to App Store Connect (TestFlight)
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file /tmp/ipa/ontheroad.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload .ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ontheroad-${{ env.VERSION }}-${{ env.BUILD_NUMBER }}
          path: /tmp/ipa/ontheroad.ipa
          if-no-files-found: warn
          retention-days: 7

      # Push notification on success/failure, mirroring release.yml. No-op unless
      # the NTFY_TOPIC secret is set.
      - name: Send ntfy notification
        if: always()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC secret not set — skipping notification."
            exit 0
          fi
          if [ "${{ job.status }}" = "success" ]; then
            curl -fsS \
              -H "Title: TestFlight upload ready" \
              -H "Tags: white_check_mark" \
              -H "Click: https://appstoreconnect.apple.com/apps" \
              -d "On the Road ${VERSION} (build ${BUILD_NUMBER}) uploaded — processing in TestFlight" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          else
            curl -fsS \
              -H "Title: TestFlight upload failed" \
              -H "Tags: x" \
              -H "Priority: high" \
              -H "Click: ${RUN_URL}" \
              -d "On the Road ${VERSION:-?} release — tap for logs" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          fi
