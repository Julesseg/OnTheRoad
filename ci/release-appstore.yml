# App Store release pipeline — builds and uploads to TestFlight / App Store
# Connect when you push a branch named `release/X.X.X`.
#
# ── INSTALL ──────────────────────────────────────────────────────────────────
# This file lives under ci/ because the automated push lacks `workflow` scope.
# Copy it to `.github/workflows/release-appstore.yml` on the default branch
# (easiest in the GitHub web UI: Add file → Create new file → paste that path
# and these contents).
#
# ── ONE-TIME SETUP ───────────────────────────────────────────────────────────
# 1. App Store Connect → Users and Access → Integrations → App Store Connect API
#    → create a Team key with the "App Manager" role. Download the .p8 ONCE.
# 2. Add these repo secrets (Settings → Secrets and variables → Actions):
#      APP_STORE_CONNECT_KEY_ID      the key's Key ID (e.g. ABC123XYZ9)
#      APP_STORE_CONNECT_ISSUER_ID   the Issuer ID shown above the keys list
#      APP_STORE_CONNECT_KEY_P8      the full contents of the .p8 file
#    (APPLE_TEAM_ID and KEYCHAIN_PASSWORD already exist for the ad-hoc pipeline.)
# 3. The app record must already exist in App Store Connect for bundle id
#    com.julesseguin.ontheroad (see store/README.md checklist).
#
# Then: `git switch -c release/1.0.0 && git push -u origin release/1.0.0`
# builds 1.0.0, signs it for the App Store via the API key (automatic signing,
# no manual profiles), and uploads it to TestFlight. Build number = CI run
# number, so every upload is unique and increasing.
name: Release (App Store)

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version to release (X.X.X)'
        required: true

# One release build per branch; a newer push supersedes an older in-flight one.
concurrency:
  group: release-appstore-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & upload to App Store Connect
    runs-on: self-hosted
    env:
      PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Marketing version from the branch name (release/1.2.3 -> 1.2.3), or the
      # manual-dispatch input. Build number from the run number so each upload is
      # unique and increasing, as App Store Connect requires.
      - name: Resolve version and build number
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#release/}"
          fi
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' is not X.X.X — name the branch release/1.2.3 (or pass the version on manual dispatch)."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "Releasing $VERSION (build ${{ github.run_number }})"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Stamp version (CFBundleShortVersionString) and build number
      # (CFBundleVersion) into app.json BEFORE prebuild so the generated native
      # project carries them.
      - name: Stamp version into app config
        run: |
          node -e '
            const fs = require("fs");
            const p = "app.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j.expo.version = process.env.VERSION;
            j.expo.ios = j.expo.ios || {};
            j.expo.ios.buildNumber = process.env.BUILD_NUMBER;
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
            console.log("app.json -> version " + j.expo.version + ", build " + j.expo.ios.buildNumber);
          '

      # Clean prebuild — the @bacons/apple-targets share extension only
      # regenerates cleanly (same constraint as the ad-hoc release workflow).
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Setup Ruby via Homebrew
        run: |
          brew list ruby >/dev/null 2>&1 || brew install ruby
          echo "$(brew --prefix ruby)/bin" >> $GITHUB_PATH

      - name: Install CocoaPods
        run: |
          export GEM_HOME="$HOME/.gem"
          export PATH="$GEM_HOME/bin:$PATH"
          echo "GEM_HOME=$HOME/.gem" >> $GITHUB_ENV
          echo "$HOME/.gem/bin" >> $GITHUB_PATH
          gem list -i cocoapods >/dev/null 2>&1 || gem install cocoapods --no-document

      - name: Pod install
        run: pod install
        working-directory: ios

      # Write the API key where both xcodebuild and altool look for it:
      # ~/.appstoreconnect/private_keys/AuthKey_<KEYID>.p8
      - name: Install App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          printf '%s' "$ASC_KEY_P8" > "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      # Unlock the login keychain so the Apple Distribution certificate + key are
      # available; automatic signing uses that cert while the API key resolves the
      # App Store provisioning profiles.
      - name: Unlock keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$HOME/Library/Keychains/login.keychain-db"
          security set-keychain-settings -t 3600 "$HOME/Library/Keychains/login.keychain-db"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$HOME/Library/Keychains/login.keychain-db"

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace ios/ontheroad.xcworkspace \
            -scheme ontheroad \
            -configuration Release \
            -archivePath /tmp/ontheroad.xcarchive \
            -derivedDataPath "$HOME/Library/Developer/Xcode/DerivedData/ontheroad-runner" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export .ipa
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed "s/\$(APPLE_TEAM_ID)/$APPLE_TEAM_ID/" ci/ExportOptions-appstore.plist > /tmp/ExportOptions-appstore.plist
          xcodebuild -exportArchive \
            -archivePath /tmp/ontheroad.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions-appstore.plist \
            -exportPath /tmp/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$ASC_KEY_PATH"

      - name: Upload to App Store Connect (TestFlight)
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file /tmp/ipa/ontheroad.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload .ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ontheroad-${{ env.VERSION }}-${{ env.BUILD_NUMBER }}
          path: /tmp/ipa/ontheroad.ipa
          if-no-files-found: warn
          retention-days: 7
